name: CI

# Runs the library gate matrix (lint + typecheck + test + build) on every
# push to main and on every pull_request, so changes are gated before they
# reach a release tag. Release-time gating is still performed by release.yml
# before `npm publish`; this workflow gives early signal on ordinary PRs.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist artifacts
        run: |
          test -f dist/index.js
          test -f dist/index.mjs
          test -f dist/index.d.ts
          test -f dist/globals.css
          test -f dist/react-server.js
          test -f dist/react-server.mjs
          test -f dist/finance.js
          test -f dist/finance.mjs
          test -f dist/templates/investment-ops/index.js